<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Game</title>
</head>
<body>
<div>
    <div id="charactersheet">
        <p>Character sheet here</p>
    </div>

    <details>
        <summary>Inventory</summary>
        <div id="inventory">
            <p>Placeholder item</p>
        </div>
    </details>

    <details>
        <summary>Equipment</summary>
        <div id="equipment">
            <p>Placeholder item</p>
        </div>
    </details>
</div>
<div>
    <div id="output"></div>
    <input type="text" id="usercommand" placeholder="What do you do?">
</div>
<div>
    <div id="players">
        <p>Placeholder player</p>
    </div>

    <div id="missions">
        <p>Placeholder mission</p>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="game.js"></script>
</body>
</html>
